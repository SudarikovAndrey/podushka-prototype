    /* ===== UTIL / PERSISTENCE ===== */
    function show(id){ const el=$(id); if(!el) return; el.classList.remove('closing'); el.classList.add('show'); const sh=el.querySelector('.sheet'); if(sh){ sh.style.animation='none'; void sh.offsetWidth; sh.style.animation=''; sh.scrollTop = 0; } }
    function hide(id){ const el=$(id); if(!el) return; if(!el.classList.contains('show')){ el.classList.remove('closing'); return; } el.classList.add('closing'); setTimeout(()=>{ el.classList.remove('show','closing'); }, 195); }
    const SAVE_KEY = 'podushka.save.v1', HIST_KEY = 'podushka.hist.v1';
    const LS = {
      get(k){ try { return JSON.parse(localStorage.getItem(k)); } catch(e){ return null; } },
      set(k,v){ try { localStorage.setItem(k, JSON.stringify(v)); } catch(e){} },
      del(k){ try { localStorage.removeItem(k); } catch(e){} },
    };
    let ended = false;
    function saveGame(){
      if (!S || ended) return;
      const scal = {};
      ['month','cash','cushion','deposit','debt','health','mood','rel','salary','credit','creditLeft',
       'catCost','cashback','depositOpen','monthTotal','mfo','level','bonds','stocks','bondsOpen','stocksOpen','fund','fundOpen','examPassed','bestCap','gotBonus','mEarn','mSpend','impulses','crisesTotal','crisesAbsorbed','loansTaken']
        .forEach(k=>scal[k]=S[k]);
      LS.set(SAVE_KEY, {
        scal,
        used: [...S.used].map(t=>POOL.findIndex(c=>c.t===t)).filter(i=>i>=0),
        usedCr: [...S.usedCr],
        flags: S.flags,
        deck: S.deck.map(it=>it.crisis ? {c:CRISES.indexOf(it.crisis)} : {p:POOL.indexOf(it.card)}),
        pending: S.pending,
        seenNotes: [...S.seenNotes],
        monthLog: S.monthLog,
        snap: S.snap || null,
        capHist: S.capHist,
        glossary: [...S.glossary],
      });
    }
    function loadGame(){
      const d = LS.get(SAVE_KEY);
      if (!d || !d.scal) return false;
      S = newState(); Object.assign(S, d.scal);
      S.used = new Set((d.used||[]).map(i=>POOL[i] && POOL[i].t).filter(Boolean));
      S.usedCr = new Set(d.usedCr || []);
      S.flags = d.flags || {};
      S.deck = (d.deck||[]).map(o=> o.c!=null ? {crisis:CRISES[o.c]} : {card:POOL[o.p]}).filter(it=>it.crisis||it.card);
      S.pending = d.pending || [];
      S.seenNotes = new Set(d.seenNotes || []);
      S.monthLog = d.monthLog || [];
      S.snap = d.snap || null;
      S.capHist = d.capHist || [];
      S.glossary = new Set(d.glossary || []);
      if (!S.monthTotal) S.monthTotal = S.deck.length || CARDS_PER_MONTH;
      return true;
    }
    function pushHist(result){
      if (!S) return;
      const hist = LS.get(HIST_KEY) || [];
      const cap = totalCap();
      const q = Math.round((S.health + S.mood + S.rel) / 3);
      hist.unshift({
        d: Date.now(), result, m: Math.min(S.month, maxMonths()),
        cap, q, lvl: S.level,
        rank: result === 'debt' ? '💀 Долговая спираль' : (result === 'abandoned' ? '⏸ Брошена' : title(cap)[0] + ' ' + title(cap)[1]),
        imp: S.impulses, loans: S.loansTaken,
      });
      LS.set(HIST_KEY, hist.slice(0, 30));
    }
    function histHTML(){
      const hist = LS.get(HIST_KEY) || [];
      if (!hist.length) return '<p class="small">Прошлых сессий пока нет.</p>';
      return hist.map(h=>{
        const date = new Date(h.d).toLocaleDateString('ru-RU', {day:'numeric', month:'short'});
        const qIco = h.q == null ? '' : (h.q >= 70 ? ' 🌞' : h.q >= 40 ? ' 🙂' : h.q >= 20 ? ' 🥱' : ' 🧟');
        return `<div class="row"><span>${date} · ${h.rank}${qIco}${h.lvl >= 2 ? ' · 📈' : ''}</span><b>${h.m} мес · ${fmt(h.cap)}</b></div>`;
      }).join('');
    }

    /* ===== SESSION FLOW ===== */
    function startRun(){ hide('startOvl'); hide('endOvl'); hide('setOvl'); ended = false; noteQueue = []; noteThen = null; S = newState(); renderHUD(); animateHUD(); payday(); }
    function newSession(){ if (S && !ended){ pushHist('abandoned'); } LS.del(SAVE_KEY); startRun(); }
    function continueRun(){
      if (!loadGame()){ startRun(); return; }
      ended = false; hide('startOvl'); hide('endOvl'); hide('setOvl'); renderHUD(); animateHUD();
      if (S.deck && S.deck.length) showCard(); else { buildDeck(); saveGame(); showCard(); }
    }
    function openSettings(){
      $('histList').innerHTML = histHTML();
      const gl = S ? [...S.glossary] : [];
      $('glosList').innerHTML = gl.length
        ? gl.map(k=>TERMS[k] ? `<div class="row" style="flex-direction:column;align-items:flex-start;gap:3px"><b>${TERMS[k].w}</b><span class="small" style="font-size:13px">${TERMS[k].d}</span></div>` : '').join('')
        : '<p class="small">Пока пусто. Жми подчёркнутые слова в игре — они соберутся здесь.</p>';
      show('setOvl');
    }
    function closeSettings(){ hide('setOvl'); }
    /* dev: jump straight to level 2 with average level-1 results */
    function devLevel2(){
      if (S && !ended) pushHist('abandoned');
      LS.del(SAVE_KEY);
      hide('setOvl'); hide('startOvl'); hide('endOvl');
      ended = false; noteQueue = []; noteThen = null;
      S = newState();
      Object.assign(S, { month:7, level:2, cash:12000, cushion:40000, deposit:20000, depositOpen:true,
        salary:84000, creditLeft:0, health:60, mood:60, rel:60, impulses:3, crisesTotal:8, crisesAbsorbed:5 });
      renderHUD(); animateHUD(); payday();
      // подводка к облигациям придёт карточкой банка в первой же колоде
    }
    /* dev: jump to level 3 with average level-2 results */
    function devLevel3(){
      if (S && !ended) pushHist('abandoned');
      LS.del(SAVE_KEY);
      hide('setOvl'); hide('startOvl'); hide('endOvl');
      ended = false; noteQueue = []; noteThen = null;
      S = newState();
      Object.assign(S, { month:13, level:3, cash:15000, cushion:60000, deposit:30000, depositOpen:true,
        bonds:20000, stocks:15000, bondsOpen:true, stocksOpen:true,
        salary:84000, creditLeft:0, health:60, mood:60, rel:60, impulses:5, crisesTotal:14, crisesAbsorbed:9 });
      renderHUD(); animateHUD(); payday();
    }
    function setTheme(k){ applyTheme(k); }
    function renderStart(){
      const saved = LS.get(SAVE_KEY); const btns = $('startBtns');
      if (saved && saved.scal){
        btns.innerHTML = `<button class="btn" onclick="G.continueRun()">▶ Продолжить (месяц ${saved.scal.month})</button>
          <button class="btn sec" onclick="G.newSession()">Новая сессия</button>`;
      } else { btns.innerHTML = '<button class="btn" onclick="G.newSession()">Начать жизнь</button>'; }
      const hist = LS.get(HIST_KEY) || [];
      $('startHist').textContent = hist.length ? `Сыграно сессий: ${hist.length}. Лучший капитал: ${fmt(Math.max(...hist.map(h=>h.cap)))}` : '';
    }

    /* ===== SHELL ===== */
    const SHELL = `
      <div id="hud">
        <div class="topbar">
          <div class="month"><span class="mLabel">Месяц</span><span class="mNum" id="monthNum">1</span><span class="mOf" id="monthOf">/ ${MONTHS}</span><div class="mProg"><div class="mProgFill" id="mProgFill"></div></div></div>
          <button class="iconbtn" onclick="G.openFlow()" aria-label="Движение денег" style="font-size:17px">📊</button>
          <button class="iconbtn" onclick="G.openSettings()" aria-label="Меню">${GEAR}</button>
        </div>
        <div class="money" id="moneyCard" onclick="G.openPortfolio()">
          <div style="display:flex;justify-content:space-between;align-items:flex-end;gap:10px">
            <div style="min-width:0"><div class="moneyLbl">На карте</div><div class="moneyVal" id="vMoney">15 000 ₽</div></div>
            <div style="text-align:right;flex:0 0 auto"><div class="moneyLbl">Капитал ›</div><div class="capMini" id="vCap">15К</div></div>
          </div>
          <div class="assetLine" id="assetLine"></div>
          <div class="debt" id="debtTag">долг <b>0 ₽</b></div>
        </div>
        <div class="stats">
          <div class="meter" id="stHealth"><div class="mTop"><span class="mIco" style="color:var(--health)">${ICO.h}</span><span class="mVal" id="vHealth">70</span></div><div class="mBar" id="bHealth"><i style="width:70%;background:var(--health)"></i></div></div>
          <div class="meter" id="stMood"><div class="mTop"><span class="mIco" style="color:var(--mood)">${ICO.o}</span><span class="mVal" id="vMood">70</span></div><div class="mBar" id="bMood"><i style="width:70%;background:var(--mood)"></i></div></div>
          <div class="meter" id="stRel"><div class="mTop"><span class="mIco" style="color:var(--rel)">${ICO.r}</span><span class="mVal" id="vRel">70</span></div><div class="mBar" id="bRel"><i style="width:70%;background:var(--rel)"></i></div></div>
        </div>
      </div>
      <div id="table">
        <div id="floats"></div>
        <div class="swipeGlow left" id="glowL"></div>
        <div class="swipeGlow right" id="glowR"></div>
        <div class="hint">свайп · ← → · тап по варианту</div>
      </div>

      <div class="ovl show" id="startOvl"><div class="sheet">
        <h1>Подушка</h1>
        <p>Тебе 27, зарплата 80&nbsp;000&nbsp;₽. Свайпай решения влево или вправо — каждое двигает деньги, здоровье, настроение и отношения.</p>
        <p><b>🎯 Три отметки за 12 месяцев:</b><br>🛡 подушка 60&nbsp;000&nbsp;₽ · 💰 капитал 150&nbsp;000&nbsp;₽ · 🌞 качество жизни ≥ 50</p>
        <p class="small">Выживи 6 месяцев без микрозаймов и накопи 40&nbsp;000 — откроется уровень «Инвестор». Шкалы влияют на зарплату: больной и выгоревший теряет деньги, бодрый получает премию.</p>
        <div id="startBtns"><button class="btn" onclick="G.newSession()">Начать жизнь</button></div>
        <p class="small" id="startHist"></p>
      </div></div>
      <div class="ovl" id="noteOvl"><div class="sheet note">
        <div class="nIco">💡</div><div class="nTitle">На заметку</div>
        <div id="noteText"></div>
        <button class="btn" onclick="G.closeNote()">Понятно</button>
      </div></div>
      <div class="ovl" id="setOvl"><div class="sheet">
        <h2>Сессии</h2>
        <div class="hist" id="histList"></div>
        <p style="margin:12px 0 0;text-align:left"><b>📖 Словарь</b></p>
        <div class="hist" id="glosList" style="max-height:30vh"></div>
        <p style="margin:12px 0 0;text-align:left"><b>Тема</b></p>
        <div class="themeRow">
          <button id="tp" onclick="G.setTheme('p')">📜 Пергамент</button>
          <button id="ta" onclick="G.setTheme('a')">🌿 Свежая</button>
          <button id="tb" onclick="G.setTheme('b')">🎪 Плакат</button>
          <button id="tc" onclick="G.setTheme('c')">🌑 Неон</button>
        </div>
        <button class="btn sec" onclick="G.closeSettings()">← Вернуться</button>
        <button class="btn" onclick="G.newSession()">Новая сессия</button>
        <div style="margin-top:10px">
          <button class="btn sec" style="font-size:12px;opacity:.75" onclick="G.devLevel2()">⚡ Dev: уровень 2</button>
          <button class="btn sec" style="font-size:12px;opacity:.75" onclick="G.devLevel3()">⚡ Dev: уровень 3</button>
        </div>
      </div></div>
      <div class="ovl" id="payOvl"><div class="sheet">
        <h2 id="payTitle">День зарплаты</h2>
        <div class="ledger" id="payLedger"></div>
        <p class="small" id="payNote"></p>
        <button class="btn" onclick="G.closePayday()">Поехали</button>
      </div></div>
      <div class="ovl" id="repOvl"><div class="sheet">
        <h2 id="repTitle">Итоги месяца</h2>
        <div id="repBody"></div>
        <button class="btn" onclick="G.openAlloc()">Дальше</button>
      </div></div>
      <div class="ovl" id="flowOvl"><div class="sheet">
        <h2 id="flowTitle">Движение денег</h2>
        <div class="hist" id="flowList"></div>
        <div class="ledger" id="flowTotals"></div>
        <button class="btn" onclick="G.closeFlow()">Закрыть</button>
      </div></div>
      <div class="ovl" id="allocOvl"><div class="sheet">
        <h2>Свободные деньги</h2>
        <p class="small">Раскидай остаток. Что не спрячешь — останется на карте и будет искушать.</p>
        <div id="allocLeft">0 ₽</div>
        <div id="allocState" style="margin-top:8px"></div>
        <div class="alloc">
          <button id="allocCush" onclick="G.alloc('cushion')">🛡 В подушку<b>+10&nbsp;000</b></button>
          <button id="allocDep" onclick="G.alloc('deposit')" disabled>🏦 На депозит<b>+10&nbsp;000</b></button>
          <button id="allocFun" onclick="G.alloc('fun')">🎉 На себя<b>−10&nbsp;000, 😊+</b></button>
        </div>
        <div class="alloc" id="allocLvl2" style="display:none">
          <button id="allocBonds" onclick="G.alloc('bonds')">📜 Облигации<b>~14%/год, стабильно</b></button>
          <button id="allocStocks" onclick="G.alloc('stocks')">📈 Акции<b>больше, но трясёт</b></button>
        </div>
        <div class="alloc" id="allocLvl3" style="display:none">
          <button id="allocFund" onclick="G.alloc('fund')">📦 Фонд<b>рынок целиком, мягче</b></button>
          <button id="allocTrade" onclick="G.openTrade()">🕹 Торговая сессия<b>ставка 10 000</b></button>
        </div>
        <p class="small" id="allocOutLbl" style="margin:10px 0 0;display:none">⇄ Вывести обратно в деньги:</p>
        <div class="alloc" id="allocOut" style="display:none">
          <button id="wDep" onclick="G.alloc('wDeposit')">🏦→💰<b>10 000</b></button>
          <button id="wBonds" onclick="G.alloc('wBonds')">📜→💰<b>10 000</b></button>
          <button id="wStocks" onclick="G.alloc('wStocks')">📈→💰<b>10 000</b></button>
          <button id="wFund" onclick="G.alloc('wFund')">📦→💰<b>10 000</b></button>
        </div>
        <button class="btn sec" style="margin-top:14px" onclick="G.nextMonth()">Хватит, живём дальше →</button>
      </div></div>
      <div class="ovl" id="termOvl"><div class="sheet note" id="termBody"></div></div>
      <div class="ovl" id="portOvl"><div class="sheet">
        <h2>💼 Портфель</h2>
        <div id="portBody"></div>
        <p class="small" style="margin-top:8px">Подчёркнутые названия — тапни, чтобы узнать, что это.</p>
        <button class="btn" onclick="G.closePortfolio()">Закрыть</button>
      </div></div>
      <div class="ovl" id="examOvl"><div class="sheet">
        <h2>📋 Тест брокера</h2>
        <div id="examBody"></div>
      </div></div>
      <div class="ovl" id="tradeOvl"><div class="sheet">
        <h2>🕹 Торговая сессия</h2>
        <div id="tradeBody"></div>
      </div></div>
      <div class="ovl" id="skillOvl"><div class="sheet">
        <h2>🚿 Прорвало кран!</h2>
        <div id="skillBody"></div>
      </div></div>
      <div class="ovl" id="endOvl"><div class="sheet" id="endSheet"></div></div>
    `;

    $('app').innerHTML = SHELL;
    window.G = { startRun, newSession, continueRun, openSettings, closeSettings, closeNote, closePayday, openAlloc, alloc, nextMonth, startLevel2, startLevel3, finishNow: finish, finGo, openFlow, closeFlow, setTheme, devLevel2, devLevel3, examAnswer, openTrade, tradeAct, closeTrade, skillStop, closeTerm, openPortfolio, closePortfolio };
    document.addEventListener('keydown', keyHandler);
    applyTheme(LS.get(THEME_KEY) || 'p');
    let _fitting=false, _lastS=-1;
    function fitScale(){
      if(_fitting) return; _fitting=true;
      requestAnimationFrame(()=>{
        const stage=document.querySelector('.stage'), frame=document.querySelector('.frame');
        if(stage&&frame){
          const s=Math.min(1,(stage.clientHeight-10)/816,(stage.clientWidth-8)/430);
          if(Math.abs(s-_lastS)>0.002){ _lastS=s; frame.style.transform='scale('+s+')'; }
        }
        _fitting=false;
      });
    }
    window.addEventListener('resize', fitScale);
    fitScale(); setTimeout(fitScale, 80);
    renderStart();
})();
</script></body>
</html>
