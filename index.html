<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Подушка — прототип</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Caveat:wght@500;600;700&family=Hanken+Grotesk:wght@400;600;700;800&family=Bricolage+Grotesque:wght@600;700;800&family=Syne:wght@600;700;800&family=Manrope:wght@500;700;800&family=Space+Grotesk:wght@400;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:'Hanken Grotesk',system-ui,-apple-system,sans-serif;background:#0a0b0e;color:#111;}
a{color:var(--accent);text-decoration:none;} a:hover{opacity:.82;}

.stage{min-height:100vh;height:100vh;width:100%;display:flex;align-items:center;justify-content:center;overflow:hidden;background:radial-gradient(120% 120% at 50% 0%,#1b1d23,#08090c);}
.frame{
  --bg:radial-gradient(120% 82% at 50% 33%,#4B3720 0%,#2C2013 47%,#160E06 100%);
  --surface:#F3E7CB;--surface-2:#E7D7B4;--border:#D3BF95;--text:#33281A;--muted:#8B7A59;
  --accent:#B27231;--accent-ink:#FBF3DF;--good:#3F7C49;--bad:#B4472E;
  --health:#C1553F;--mood:#C1852B;--rel:#5E7C8C;--shield:#B27231;--money:#9C6E2C;
  --dir-left:#B4472E;--dir-right:#2F6E43;
  --glow-left:rgba(180,71,46,.42);--glow-right:rgba(47,110,67,.42);
  --radius:15px;--radius-sm:12px;
  --card-shadow:0 26px 50px -18px rgba(12,7,2,.62),0 6px 16px rgba(12,7,2,.32);
  --font-display:'Lora',Georgia,serif;
  --font-text:'Lora',Georgia,serif;
  --font-num:'Lora',Georgia,serif;
  --font-hand:'Caveat','Segoe Script',cursive;
  --cream:#F0E5CC;
  position:relative;width:430px;height:816px;flex:0 0 auto;transform-origin:center center;
  background:var(--bg);color:var(--text);overflow:hidden;display:flex;flex-direction:column;font-family:var(--font-text);
  border-radius:46px;box-shadow:0 50px 100px -24px rgba(0,0,0,.75),0 0 0 11px #16181d,0 0 0 13px #2a2d34;
}
#app{flex:1;min-height:0;display:flex;flex-direction:column;padding:10px 13px calc(12px + env(safe-area-inset-bottom));position:relative;}

.themebar{flex:0 0 auto;display:flex;gap:6px;margin-bottom:9px;}
.tBtn{flex:1;display:flex;flex-direction:column;gap:1px;align-items:flex-start;padding:7px 10px;border-radius:13px;border:1.5px solid var(--border);background:var(--surface);cursor:pointer;font-family:var(--font-text);transition:transform .12s,border-color .12s,box-shadow .12s;text-align:left;}
.tBtn b{font-family:var(--font-display);font-weight:700;font-size:12.5px;color:var(--text);letter-spacing:.2px;}
.tBtn span{font-size:9px;letter-spacing:.4px;text-transform:uppercase;color:var(--muted);}
.tBtn.active{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent);}
.tBtn:active{transform:scale(.97);}

#hud{flex:0 0 auto;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.month{display:flex;align-items:center;gap:7px;flex:1;}
.mLabel{font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:1.6px;color:var(--cream);text-transform:uppercase;}
.mNum{font-family:var(--font-num);font-weight:700;font-size:21px;color:var(--cream);line-height:1;}
.mOf{font-size:12px;color:rgba(240,229,204,.5);}
.mProg{flex:1;height:6px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-left:5px;}
.mProgFill{height:100%;width:0;background:var(--accent);border-radius:6px;transition:width .4s;}
.iconbtn{width:38px;height:38px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;border-radius:12px;border:1.5px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;transition:transform .12s;}
.iconbtn svg{width:20px;height:20px;} .iconbtn:active{transform:scale(.94);}

.money{margin-top:8px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:9px 14px 8px;display:flex;flex-direction:column;gap:1px;position:relative;box-shadow:var(--card-shadow);cursor:pointer;}
.money:active{transform:scale(.99);}
.moneyLbl{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:1.8px;color:var(--muted);text-transform:uppercase;}
.moneyVal{font-family:var(--font-num);font-weight:800;font-size:26px;line-height:1.05;color:var(--money);letter-spacing:-.5px;white-space:nowrap;}
.moneyVal.neg{color:var(--bad);}
.capMini{font-family:var(--font-num);font-weight:800;font-size:19px;line-height:1.1;color:var(--text);white-space:nowrap;}
.assetLine{display:flex;flex-wrap:wrap;gap:3px 12px;margin-top:6px;min-height:0;}
.assetLine:empty{display:none;}
.aChip{font-size:12px;font-weight:700;color:var(--muted);white-space:nowrap;}
.aChip b{font-family:var(--font-num);font-weight:800;color:var(--text);}
.aChip.hit{animation:shield .6s;display:inline-block;}
.debt{position:absolute;top:-9px;right:12px;font-size:11.5px;font-weight:700;color:#fff;background:var(--bad);padding:3px 9px;border-radius:12px;display:none;box-shadow:0 2px 6px rgba(0,0,0,.3);}
.debt b{font-weight:800;}

.stats{display:flex;gap:8px;margin-top:7px;}
.meter{flex:1;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:8px 10px 9px;}
.mTop{display:flex;align-items:center;justify-content:space-between;}
.mIco{display:flex;} .mIco svg{width:18px;height:18px;}
.mVal{font-family:var(--font-num);font-weight:800;font-size:16px;color:var(--text);}
.mBar{height:7px;border-radius:6px;background:var(--surface-2);overflow:hidden;margin-top:6px;}
.mBar i{display:block;height:100%;border-radius:6px;transition:width .4s;}

.safety{display:flex;gap:8px;margin-top:7px;}
.chip{flex:1;display:flex;align-items:center;gap:7px;background:var(--surface);border:1.5px solid var(--border);border-radius:14px;padding:10px 13px;font-size:13.5px;font-weight:600;color:var(--muted);}
.chip .cIco{font-size:16px;line-height:1;}
.chip b{margin-left:auto;font-family:var(--font-num);font-weight:800;font-size:16px;color:var(--text);}
#cushionChip{border-color:color-mix(in srgb,var(--shield) 40%,var(--border));}
#cushionChip.hit{animation:shield .6s;}
@keyframes shield{0%{transform:scale(1)}30%{transform:scale(1.05);box-shadow:0 0 0 4px var(--glow-right)}100%{transform:scale(1)}}

#table{flex:1 1 auto;position:relative;display:flex;align-items:center;justify-content:center;min-height:0;margin-top:8px;}
.swipeGlow{position:absolute;top:0;bottom:0;width:62%;pointer-events:none;opacity:0;transition:opacity .1s;z-index:1;}
.swipeGlow.left{left:-8%;background:radial-gradient(88% 78% at 0% 50%,var(--glow-left),transparent 72%);}
.swipeGlow.right{right:-8%;background:radial-gradient(88% 78% at 100% 50%,var(--glow-right),transparent 72%);}
.hint{position:absolute;bottom:0;width:100%;text-align:center;font-family:var(--font-text);font-size:12.5px;letter-spacing:.3px;color:rgba(240,229,204,.62);opacity:1;z-index:2;}

.card{position:absolute;width:min(92%,360px);height:min(100%,560px);max-height:100%;background:linear-gradient(168deg,#F7EDD7 0%,#EFE1C3 100%);border:1.5px solid var(--border);border-radius:var(--radius);box-shadow:var(--card-shadow);padding:18px 18px 15px;display:flex;flex-direction:column;user-select:none;touch-action:none;z-index:5;overflow:hidden;}
.card.back{transform:scale(.93) translateY(15px);opacity:.55;z-index:4;filter:saturate(.9);}
.card.top{cursor:grab;transition:transform .28s cubic-bezier(.2,.7,.3,1),box-shadow .18s;animation:cardIn .46s cubic-bezier(.2,.9,.3,1);}
.card.top:active{cursor:grabbing;}
.card.top.drag{box-shadow:0 42px 74px -22px rgba(0,0,0,.5),0 0 0 1px var(--border);}
.card.crisis{border-color:color-mix(in srgb,var(--bad) 55%,var(--border));}
.card::before{content:'';position:absolute;inset:0;border-radius:inherit;pointer-events:none;opacity:.6;background-image:repeating-linear-gradient(0deg,rgba(120,92,48,.04) 0 1px,transparent 1px 3px),repeating-linear-gradient(90deg,rgba(120,92,48,.03) 0 1px,transparent 1px 3px);}
.card::after{content:'';position:absolute;inset:7px;border:1px solid rgba(120,92,48,.28);border-radius:calc(var(--radius) - 5px);pointer-events:none;}
.cCat{align-self:flex-start;font-family:var(--font-display);font-weight:700;font-size:12px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);background:transparent;padding:0 2px 3px;border-radius:0;border-bottom:2px solid color-mix(in srgb,var(--muted) 42%,transparent);position:relative;z-index:2;}
.card.crisis .cCat{color:var(--bad);border-bottom-color:color-mix(in srgb,var(--bad) 45%,transparent);}
.cArt{flex:1 1 0;min-height:0;display:flex;align-items:flex-end;justify-content:center;padding:10px 0 6px;position:relative;z-index:2;}
.cEmoji{font-size:clamp(46px,11vh,76px);line-height:1;filter:drop-shadow(0 6px 10px rgba(0,0,0,.14));}
.cText{flex:1 1 0;min-height:0;overflow:hidden;display:flex;align-items:flex-start;justify-content:center;text-align:center;text-wrap:pretty;font-family:var(--font-text);font-weight:500;font-size:clamp(16px,4.7vw,20px);line-height:1.42;color:var(--text);padding:12px 8px 4px;position:relative;z-index:2;}
.cStamp{position:absolute;top:20%;left:50%;font-family:var(--font-display);font-weight:700;font-size:21px;line-height:1.1;letter-spacing:1px;text-transform:uppercase;padding:9px 20px;border:2.5px solid rgba(255,247,232,.6);border-radius:11px;opacity:0;color:#FBF3DF;pointer-events:none;z-index:9;max-width:76%;text-align:center;white-space:normal;text-shadow:0 1px 1px rgba(0,0,0,.22);box-shadow:0 8px 22px rgba(20,10,2,.32);transition:opacity .05s;}
.cStamp.left{transform:translate(-50%,0) rotate(-7deg) scale(.9);background:var(--dir-left);}
.cStamp.right{transform:translate(-50%,0) rotate(7deg) scale(.9);background:var(--dir-right);}

.choices{flex:0 0 auto;display:flex;gap:0;position:relative;z-index:2;padding-top:9px;margin-top:5px;border-top:1.5px dashed color-mix(in srgb,var(--muted) 44%,transparent);}
.choice{flex:1;display:flex;flex-direction:column;gap:3px;align-items:center;text-align:center;cursor:pointer;background:transparent;border:none;border-radius:0;padding:11px 10px 3px;font-family:var(--font-text);transition:opacity .15s;}
.choice + .choice{border-left:1.5px dashed color-mix(in srgb,var(--muted) 44%,transparent);}
.choice:active{opacity:.5;}
.choice .dir{font-family:var(--font-display);font-weight:600;font-size:12px;letter-spacing:1.2px;text-transform:uppercase;color:var(--muted);}
.choice .lbl2{font-family:var(--font-display);font-weight:600;font-size:17px;line-height:1.2;color:var(--text);}
.choice .fx{font-size:14.5px;font-weight:600;margin-top:3px;}
.choice[data-side="L"].hot .lbl2{color:var(--dir-left);}
.choice[data-side="R"].hot .lbl2{color:var(--dir-right);}
.choice.hot .dir{color:var(--text);}
.eff .g{color:var(--good);font-weight:700;white-space:nowrap;} .eff .b{color:var(--bad);font-weight:700;white-space:nowrap;}
.eff svg{width:14px;height:14px;vertical-align:-2px;}

#floats{position:absolute;inset:0;pointer-events:none;z-index:30;display:flex;flex-direction:column;align-items:center;gap:8px;padding-top:8%;}
.float{display:flex;align-items:center;gap:7px;padding:9px 18px;border-radius:22px;font-family:var(--font-num);font-size:21px;font-weight:800;color:#fff;animation:rise 1.6s forwards;box-shadow:0 10px 24px -6px rgba(0,0,0,.4);}
.float svg{width:22px;height:22px;}
.float.up{background:var(--good);} .float.down{background:var(--bad);}
.float.neu{background:var(--muted);font-size:17px;}
.goalRow{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14px;text-align:left;}
.goalRow .gDone{color:var(--good);font-weight:800;font-family:var(--font-num);white-space:nowrap;}
.goalRow .gTodo{color:var(--muted);font-weight:700;font-family:var(--font-num);white-space:nowrap;}
.themeRow{display:flex;gap:6px;margin-top:8px;}
.themeRow button{flex:1;padding:9px 4px;font-family:var(--font-text);font-weight:700;font-size:11.5px;cursor:pointer;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;color:var(--text);}
.themeRow button.active{border-color:var(--accent);box-shadow:0 0 0 1.5px var(--accent);}
@keyframes rise{0%{opacity:0;transform:translateY(14px) scale(.8)}14%{opacity:1;transform:translateY(0) scale(1.06)}24%{transform:scale(1)}72%{opacity:1}100%{opacity:0;transform:translateY(-44px)}}

.ovl{position:absolute;inset:0;z-index:50;display:none;align-items:center;justify-content:center;padding:18px;background:rgba(10,14,12,.5);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);}
.ovl.show{display:flex;animation:fade .18s;}
@keyframes fade{from{opacity:0}to{opacity:1}}
.sheet{width:100%;max-width:360px;max-height:94%;overflow-y:auto;background:var(--surface);border:1.5px solid var(--border);border-radius:26px;box-shadow:0 40px 80px -24px rgba(0,0,0,.5);padding:24px 22px;text-align:center;animation:pop .22s cubic-bezier(.2,.8,.3,1);}
@keyframes pop{0%{opacity:0;transform:translateY(22px) scale(.92)}58%{opacity:1;transform:translateY(-6px) scale(1.025)}80%{transform:translateY(2px) scale(.995)}100%{opacity:1;transform:none}}
@keyframes popOut{from{opacity:1;transform:none}to{opacity:0;transform:translateY(18px) scale(.93)}}
@keyframes fadeOut{from{opacity:1}to{opacity:0}}
.ovl.closing{animation:fadeOut .2s ease forwards;}
.ovl.closing .sheet{animation:popOut .2s cubic-bezier(.45,0,.75,.4) forwards;}
@keyframes jellyIn{0%{opacity:0;transform:translateY(26px) scale(.88)}54%{opacity:1;transform:translateY(-6px) scale(1.05)}76%{transform:translateY(2px) scale(.98)}100%{opacity:1;transform:translateY(0) scale(1)}}
@keyframes cardIn{0%{opacity:0;transform:translateY(32px) scale(.86)}56%{opacity:1;transform:translateY(-8px) scale(1.035)}80%{transform:translateY(3px) scale(.99)}100%{opacity:1;transform:translateY(0) scale(1)}}
.hud-anim .topbar{animation:jellyIn .5s both;}
.hud-anim .money{animation:jellyIn .5s both .06s;}
.hud-anim .meter{animation:jellyIn .5s both;}
.hud-anim .meter:nth-child(1){animation-delay:.13s;}
.hud-anim .meter:nth-child(2){animation-delay:.19s;}
.hud-anim .meter:nth-child(3){animation-delay:.25s;}
.hud-anim .chip{animation:jellyIn .5s both;}
.hud-anim .chip:nth-child(2){animation-delay:.35s;}
.hud-anim .chip:nth-child(1){animation-delay:.3s;}
.sheet h1{font-family:var(--font-display);font-weight:700;font-size:34px;color:var(--text);letter-spacing:0;line-height:1.1;}
.sheet h2{font-family:var(--font-display);font-weight:800;font-size:21px;color:var(--text);}
.sheet p{font-size:16px;line-height:1.55;margin:12px 0;color:var(--text);}
.sheet .small{font-size:14px;line-height:1.5;color:var(--muted);}
.nIco{font-size:44px;} .nTitle{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:var(--accent);margin:6px 0 8px;}
#noteText{font-family:var(--font-text);font-weight:500;font-size:18px;line-height:1.55;color:var(--text);}
.ledger{text-align:left;font-size:14px;margin:14px auto;max-width:290px;}
.ledger div{display:flex;justify-content:space-between;gap:10px;padding:6px 0;border-bottom:1px solid var(--border);}
.ledger div b{font-family:var(--font-num);} .ledger b.plus{color:var(--good);} .ledger b.minus{color:var(--bad);}
.btn{display:inline-block;margin:8px 5px 0;padding:13px 22px;font-family:var(--font-display);font-weight:700;font-size:15px;cursor:pointer;color:var(--accent-ink);background:var(--accent);border:none;border-radius:15px;transition:transform .12s,box-shadow .12s;box-shadow:0 10px 22px -8px var(--glow-right);}
.btn:active{transform:translateY(2px);box-shadow:none;}
.btn.sec{background:var(--surface-2);color:var(--text);box-shadow:none;border:1.5px solid var(--border);font-size:13.5px;padding:11px 16px;}
.alloc{display:flex;gap:8px;margin-top:14px;}
.alloc button{flex:1;padding:12px 7px;font-family:var(--font-text);font-weight:700;font-size:12.5px;cursor:pointer;background:var(--surface-2);border:1.5px solid var(--border);border-radius:14px;color:var(--text);transition:transform .12s;}
.alloc button b{display:block;font-family:var(--font-num);font-size:14px;margin-top:3px;color:var(--accent);}
.alloc button:active{transform:scale(.96);} .alloc button:disabled{opacity:.4;}
#allocLeft{font-family:var(--font-num);font-weight:800;font-size:22px;margin-top:8px;color:var(--money);}
.hist{text-align:left;margin-top:12px;max-height:44vh;overflow-y:auto;}
.hist .row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 2px;border-bottom:1px solid var(--border);font-size:15px;color:var(--text);}
.hist .row b{white-space:nowrap;font-family:var(--font-num);font-weight:700;font-size:15px;}
/* ---- layout & input hardening ---- */
.frame{user-select:none;-webkit-user-select:none;touch-action:manipulation;}
.safety{flex-wrap:wrap;}
.safety .chip{flex:1 1 46%;min-width:0;}
.topbar{min-width:0;}
.topbar .month{min-width:0;overflow:hidden;}
.mProg{min-width:24px;}
.mOf{white-space:nowrap;}
.chip b{overflow:hidden;text-overflow:ellipsis;}
.choice{min-width:0;}
.choice .fx{white-space:normal;line-height:1.35;}
.eff .g,.eff .b{white-space:normal;}
/* card text must be normal text flow: flex split inline spans (glossary terms) into columns */
.cText{display:block;text-align:center;overflow:hidden;}
.cText .term{display:inline;}
/* ---- allocation particles ---- */
#allocOvl .sheet{position:relative;}
.particle{
  position:absolute;width:9px;height:9px;border-radius:50%;pointer-events:none;z-index:70;
  background:var(--accent);box-shadow:0 0 8px var(--glow-right);opacity:.95;
  transition:transform .6s cubic-bezier(.25,.6,.3,1), opacity .6s;
}
/* ---- glossary terms ---- */
.term{border-bottom:1.5px dashed color-mix(in srgb,var(--accent) 60%,transparent);cursor:pointer;}
.term:active{opacity:.65;}
/* ---- level 3: exam, trading, skill ---- */
.qOpt{display:block;width:100%;margin:7px 0;padding:12px 13px;font-family:var(--font-text);font-weight:600;font-size:14.5px;text-align:left;cursor:pointer;background:var(--surface-2);border:1.5px solid var(--border);border-radius:13px;color:var(--text);transition:transform .1s;}
.qOpt:active{transform:scale(.98);}
.chartSvg{width:100%;height:140px;display:block;background:var(--surface-2);border:1.5px solid var(--border);border-radius:12px;margin:6px 0 8px;}
.skillBar{position:relative;height:30px;border-radius:15px;margin:16px 0 6px;overflow:visible;background:color-mix(in srgb,var(--bad) 22%,var(--surface-2));border:1.5px solid var(--border);}
.skillZone{position:absolute;top:0;bottom:0;border-radius:15px;}
.skillZone.y{left:20%;right:20%;background:color-mix(in srgb,var(--mood) 38%,var(--surface-2));}
.skillZone.g{left:37%;right:37%;background:color-mix(in srgb,var(--good) 55%,var(--surface-2));}
.skillMk{position:absolute;top:-5px;width:6px;height:40px;border-radius:3px;background:var(--text);box-shadow:0 2px 6px rgba(0,0,0,.35);}
/* ---- animated month report ---- */
.rev{opacity:0;animation:revIn .45s cubic-bezier(.2,.8,.3,1) forwards;}
@keyframes revIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.capBig{font-family:var(--font-num);font-weight:800;font-size:32px;line-height:1.05;color:var(--money);margin-top:2px;}
.capDelta{font-size:14.5px;font-weight:800;font-family:var(--font-num);margin-top:1px;}
.capDelta.up{color:var(--good);} .capDelta.down{color:var(--bad);}
.secT{font-family:var(--font-display);font-weight:700;font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--muted);margin:15px 0 3px;text-align:left;}
.dRow{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);font-size:14.5px;text-align:left;}
.dRow .dv{font-family:var(--font-num);font-weight:800;white-space:nowrap;}
.dRow .dd{font-family:var(--font-num);font-weight:800;font-size:13px;white-space:nowrap;}
.dd.up{color:var(--good);} .dd.down{color:var(--bad);} .dd.zero{color:var(--muted);font-weight:600;}
.badge{display:flex;align-items:flex-start;gap:7px;padding:9px 12px;border-radius:12px;font-size:13.5px;font-weight:700;margin:5px 0;text-align:left;line-height:1.35;}
.badge.crit{background:color-mix(in srgb,var(--bad) 12%,var(--surface));color:var(--bad);border:1.5px solid color-mix(in srgb,var(--bad) 38%,transparent);}
.badge.good{background:color-mix(in srgb,var(--good) 12%,var(--surface));color:var(--good);border:1.5px solid color-mix(in srgb,var(--good) 38%,transparent);}
.pulseG{animation:pg .9s;} .pulseR{animation:pr .9s;}
@keyframes pg{0%{box-shadow:0 0 0 3px var(--good),0 0 20px 4px var(--glow-right)}100%{box-shadow:0 0 0 10px transparent}}
@keyframes pr{0%{box-shadow:0 0 0 3px var(--bad),0 0 20px 4px var(--glow-left)}100%{box-shadow:0 0 0 10px transparent}}
</style>

    const CRISES = [

    /* ===== STATE ===== */
    let S = null;
    function newState(){ return {
      month:1, cash:(props.startCash ?? 15000), cushion:0, deposit:0, debt:0,
      health:70, mood:70, rel:70,
      salary:(props.salary ?? SALARY), credit:8000, creditLeft:3, catCost:0, cashback:false, depositOpen:false,
      mfo:0, level:1, bonds:0, stocks:0, bondsOpen:false, stocksOpen:false, fund:0, fundOpen:false, examPassed:false,
      deck:[], monthTotal:0, used:new Set(), usedCr:new Set(), flags:{}, pending:[], seenNotes:new Set(), monthLog:[], capHist:[], glossary:new Set(),
      mEarn:0, mSpend:0, impulses:0, crisesTotal:0, crisesAbsorbed:0, loansTaken:0,
    };}

    /* ===== HUD ===== */
    function pulse(el, up){ if(!el) return; el.classList.remove('pulseG','pulseR'); void el.offsetWidth; el.classList.add(up?'pulseG':'pulseR'); }
    const fmtK = n => {
      const a = Math.abs(n);
      if (a >= 1e6) return (n/1e6).toFixed(1).replace('.', ',').replace(',0','') + 'М';
      if (a >= 10000) return Math.round(n/1000) + 'К';
      if (a > 0) return (n/1000).toFixed(1).replace('.', ',').replace(',0','') + 'К';
      return '0';
    };
    let cushionFx = false;
    function renderHUD(){
      $('monthNum').textContent = S.month;
      $('monthOf').textContent = '/ ' + maxMonths() + (S.level >= 3 ? ' 🏦' : (S.level >= 2 ? ' 📈' : ''));
      const prog = S.monthTotal ? (S.monthTotal - S.deck.length)/S.monthTotal : 0;
      $('mProgFill').style.width = Math.max(0,Math.min(1,prog))*100 + '%';
      const mv = $('vMoney'); mv.textContent = fmt(S.cash); mv.classList.toggle('neg', S.cash<0);
      $('vCap').textContent = fmtK(totalCap()) + ' ₽';
      const dt = $('debtTag'); dt.style.display = S.debt>0 ? '' : 'none'; if(S.debt>0) dt.querySelector('b').textContent = fmt(S.debt);
      [['Health','health'],['Mood','mood'],['Rel','rel']].forEach(([id,k])=>{
        $('v'+id).textContent = Math.round(S[k]);
        $('b'+id).firstElementChild.style.width = S[k]+'%';
      });
      /* все активы — одной компактной строкой */
      const chips = [
        ['cushionChip','🛡','Подушка', S.cushion, true],
        ['depChipA','🏦','Вклад', S.deposit, S.depositOpen],
        ['bondChipA','📜','Облиг.', S.bonds, S.bonds > 0],
        ['stockChipA','📈','Акции', S.stocks, S.stocks > 0],
        ['fundChipA','📦','Фонд', S.fund, S.fund > 0],
      ].filter(c=>c[4]);
      $('assetLine').innerHTML = chips.map(([id,ico,l,v])=>`<span class="aChip" id="${id}">${ico} ${l} <b>${fmtK(v)}</b></span>`).join('');
      if (cushionFx){ cushionFx = false; const el = $('cushionChip'); if (el){ el.classList.add('hit'); } }
    }
    function openPortfolio(){
      const rows = [
        ['💰', 'На карте', S.cash],
        ['🛡', 'Подушка (накопительный счёт, +0,5%/мес)', S.cushion],
        ['🏦', 'Депозит (+1%/мес)', S.deposit],
        ['📜', 'Облигации (купон ~14%/год)', S.bonds],
        ['📈', 'Акции (доходнее, но трясёт)', S.stocks],
        ['📦', 'Фонд (весь рынок разом)', S.fund],
      ].filter((r,i)=>i===0 || r[2] > 0);
      $('portBody').innerHTML = rows.map(([ico,l,v])=>`<div class="dRow"><span style="min-width:0">${ico} ${termify(l)}</span><span class="dv">${fmt(v)}</span></div>`).join('')
        + (S.debt ? `<div class="dRow"><span>🩸 Долг (30%/мес)</span><span class="dv" style="color:var(--bad)">−${fmt(S.debt)}</span></div>` : '')
        + `<div class="dRow" style="border-bottom:none"><span><b>Капитал всего</b></span><span class="dv">${fmt(totalCap())}</span></div>`;
      show('portOvl');
    }
    function closePortfolio(){ hide('portOvl'); setTimeout(maybeShowNote, 240); }
    function floatDelta(html, up){
      const cls = up === 'neu' ? 'neu' : (up ? 'up' : 'down');
      const f = document.createElement('div'); f.className = 'float ' + cls; f.innerHTML = html;
      $('floats').appendChild(f); setTimeout(()=>f.remove(), 1700);
    }
    let noteQueue = [], noteThen = null;
    function toast(msg){ noteQueue.push(msg); maybeShowNote(); }
    function maybeShowNote(){
      if ($('noteOvl').classList.contains('show')) return;
      /* notes are exclusive: never pop under/over another sheet — that's how advice
         got stuck invisible and resurfaced on a random later card */
      if (document.querySelector('.ovl.show:not(#noteOvl)')) return;
      while (noteQueue.length){
        const msg = noteQueue.shift();
        if (S && S.seenNotes.has(msg)) continue; // each lesson shown once per run
        if (S) S.seenNotes.add(msg);
        $('noteText').innerHTML = termify(msg); show('noteOvl');
        return;
      }
      if (noteThen){ const f = noteThen; noteThen = null; f(); }
    }
    /* show queued notes first (in context), then continue with cb (e.g. month report) */
    function showNotesThen(cb){
      noteThen = cb;
      maybeShowNote();
      if (noteThen && !$('noteOvl').classList.contains('show')){ const f = noteThen; noteThen = null; f(); }
    }
    function closeNote(){
      hide('noteOvl');
      setTimeout(()=>{
        if (noteQueue.length) maybeShowNote();
        else if (noteThen){ const f = noteThen; noteThen = null; f(); }
      }, 210);
    }

    /* ===== EFFECTS ===== */
    function applyMoney(delta, isCrisis){
      if (delta >= 0){ S.cash += delta; S.mEarn += delta; return {cushioned:0}; }
      let need = -delta, cushioned = 0;
      if (isCrisis && S.cushion > 0){
        cushioned = Math.min(S.cushion, need); S.cushion -= cushioned; need -= cushioned;
        S.crisesAbsorbed += cushioned === -delta ? 1 : 0;
        cushionFx = true; // подсветится после перерисовки HUD
      }
      S.cash -= need; S.mSpend += -delta; return {cushioned};
    }
    function clamp(k){ S[k] = Math.max(0, Math.min(100, S[k])); }
    function applyEff(eff, isCrisis){
      if (eff.m){ const r = applyMoney(eff.m, isCrisis);
        if (r.cushioned > 0) toast('Подушка приняла удар: ' + fmt(r.cushioned) + ' из неё, а не из бюджета 🛡');
        const up = eff.m > 0;
        floatDelta(ICO.m + '<span>' + ((up?'+':'−') + Math.abs(eff.m).toLocaleString('ru-RU') + ' ₽').replace(/\s/g,'\u00A0') + '</span>', up);
        pulse($('moneyCard'), up);
      }
      [['h','health','stHealth'],['o','mood','stMood'],['r','rel','stRel']].forEach(([k,stat,hudId])=>{
        if (eff[k]){
          S[stat] += eff[k]; clamp(stat);
          const up = eff[k] > 0; const icon = (k === 'o' && !up) ? ICO.osad : ICO[k];
          floatDelta(icon + '<span>' + (up?'+':'−') + Math.abs(eff[k]) + '</span>', up);
          pulse($(hudId), up);
        }
      });
      if (eff.imp) S.impulses++;
      if (eff.fx) FX[eff.fx]();
      if (eff.note) toast(eff.note);
    }
    const FX = {
      friendLoan(){ S.pending.push({label:'Друг вернул долг (о, чудо)', amount:10000, chance:.55, failLabel:'Друг «вернёт с зарплаты». Уже третьей.'}); },
      shitcoin(){ S.pending.push({label:'Та самая монета внезапно сделала иксы. Успел продать', amount:25000, chance:.1, failLabel:'Та самая монета: −97%. Советчик уже топит за новую. (Шанс иксов был ~10% — казино с лишними шагами.)'}); },
      upskill(){ S.salary += 4000; toast('Со следующего месяца зарплата +4 000 ₽ — навсегда. Навыки платят.'); },
      cat(){ S.catCost = 2000; },
      cashback(){ S.cashback = true; },
      dental(){ S.flags.dental = true; S.flags.dentalSpend = (S.flags.dentalSpend || 0) + 1; purgeCrisis('tooth'); },
      frl1(){ S.flags.frl1 = true; },
      frlPro(){ S.flags.frlPro = true; },
      bossJob(){ S.flags.boss = true; },
      lead(){ S.flags.lead = true; S.salary += 6000; toast('Проект твой: зарплата +6 000 ₽ навсегда. Вечера — уже не совсем твои.'); },
      eng(){ S.pending.push({label:'Английский сработал: оффер!', amount:0, chance:.5, salaryUp:8000, failLabel:'Интервью на английском пока мимо. Но навык остался — рекрутеры не последние.'}); },
      invCourse(){ S.flags.invEdu = true; ['bond','stock','divers'].forEach(k=>S.glossary.add(k)); toast('Курс пройден: три термина легли в словарь, а в демо-терминале теперь видна скользящая средняя — линия тренда сквозь шум.'); },
      gym(){ S.flags.gym = true; purgeCrisis('back'); },
      taxDeduct(){ S.flags.deductUsed = S.flags.dentalSpend || 0; },
      runway(){
        const monthly = 58000;
        if (S.cushion <= 0) toast('Твой запас: 0 дней. Ты — в тех самых 60%. Без зарплаты первый же месяц станет микрозаймом. Начни с любой суммы в подушку — сегодня.');
        else {
          const weeks = Math.round(S.cushion / (monthly / 4.3));
          toast('Твоя подушка ' + fmt(S.cushion) + ' — это примерно ' + weeks + ' нед. жизни без зарплаты (расходы ~58 000/мес). Минимум — месяц расходов (60 000), в идеале 3–6 месяцев (180 000+).');
        }
      },
      mfoTrap(){ S.mfo += 10000; toast('Взял 10 000 «под 0%». Проверим в конце месяца, что там с нулём процентов.'); },
      panicSell(){
        if (S.stocks > 0){ const got = Math.round(S.stocks * 0.92); S.cash += got; S.stocks = 0;
          toast('Продал на дне: зафиксировал убыток −8%. Классика: страх продаёт дёшево, жадность покупает дорого.'); }
        else toast('Продавать нечего — акций в портфеле нет. Повезло: паника прошла бесплатно.');
        renderHUD();
      },
      hype(){ S.pending.push({label:'Хайповая акция: успел выйти в плюс', amount:16000, chance:.25, failLabel:'Хайповая акция: купил на пике, −70%. Хайп — худший инвестсоветник.'}); },
      unlockBonds(){ if(!S.bondsOpen){ S.bondsOpen = true; toast('Облигации открыты. Суть: ты одалживаешь деньги государству или компании, они платят купон — здесь ~14% годовых, стабильно, без качелей. Покупка — в конце месяца, при распределении денег.'); renderHUD(); } },
      unlockStocks(){ if(!S.stocksOpen){ S.stocksOpen = true; toast('Акции открыты. Это доля в бизнесе: в среднем доходнее облигаций, но месяц к месяцу трясёт, а иногда роняет. Правило: в акции — только деньги, которые не понадобятся год и больше.'); renderHUD(); } },
      dipBuy(){ S.stocks = Math.round(S.stocks * 0.93) + 10700; toast('Купил на просадке: те же акции, но на 7% дешевле — на 10 000 взял бумаг на 10 700.'); renderHUD(); },
      dipHold(){ S.stocks = Math.round(S.stocks * 0.93); renderHUD(); },
      divReinvest(){ const div = Math.round(S.stocks * 0.03); S.stocks += div; toast('Дивиденды ' + fmt(div) + ' реинвестированы в те же акции.'); renderHUD(); },
      divCash(){ const div = Math.round(S.stocks * 0.03); S.cash += div; S.monthLog.push(['💌 Дивиденды', div]); toast('Дивиденды ' + fmt(div) + ' выведены на карту.'); renderHUD(); },
      margin(){ S.pending.push({label:'Плечо ×5: угадал движение', amount:15000, chance:.3, failLabel:'Плечо ×5: маржин-колл, −20 000 ₽. Плечо умножает в обе стороны.', failAmount:20000}); },
      unlockDeposit(){ if(!S.depositOpen){ S.depositOpen = true; toast('Открыт депозит: 1% в месяц на остаток. Деньги начали работать.'); renderHUD(); } },
      unlockFund(){ if(!S.fundOpen){ S.fundOpen = true; toast('Фонд открыт. Внутри — сразу весь рынок: диверсификация встроена, качает мягче отдельных акций. Реальный факт: больше половины первых покупок новичков в России — фонды.'); renderHUD(); } },
      openExam(){ startExam(); },
    };

    /* ===== DECK ===== */
    function shuffle(a){ for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    /* prevention retroactively removes linked crises from the CURRENT deck too —
       otherwise «сходил в зал» and next card is «спина сказала хватит» */
    function purgeCrisis(kind){
      if (!S || !S.deck) return;
      const before = S.deck.length;
      S.deck = S.deck.filter(it => !(it.crisis && it.crisis.k === kind));
      S.monthTotal -= (before - S.deck.length);
    }
    function buildDeck(){
      /* one-shot cards don't reappear once their effect is active */
      const done = c =>
        (c.L.fx === 'cat' && S.catCost > 0) ||
        (c.L.fx === 'cashback' && S.cashback) ||
        (c.L.fx === 'unlockDeposit' && S.depositOpen) ||
        (c.L.fx === 'unlockBonds' && S.bondsOpen) ||
        (c.L.fx === 'unlockStocks' && S.stocksOpen) ||
        (c.L.fx === 'unlockFund' && S.fundOpen) ||
        (c.L.fx === 'openExam' && S.examPassed) ||
        (c.L.fx === 'gym' && S.flags.gym) ||
        (c.L.fx === 'dental' && S.flags.dental) ||
        (c.L.fx === 'invCourse' && S.flags.invEdu) ||
        (c.L.fx === 'upskill' && S.salary >= SALARY + 8000);
      const reqOk = c => !c.req ||
        (c.req === 'lvl2' && S.level >= 2) ||
        (c.req === 'bonds' && S.bondsOpen) ||
        (c.req === 'stocks' && S.stocksOpen) ||
        (c.req === 'stocksHeld' && S.stocksOpen && S.stocks > 0) ||
        (c.req === 'lvl3' && S.level >= 3) ||
        (c.req === 'frl1' && S.flags.frl1) ||
        (c.req === 'frlPro' && S.flags.frlPro) ||
        (c.req === 'boss' && S.flags.boss) ||
        (c.req === 'lead' && S.flags.lead) ||
        (c.req === 'deduct' && (S.flags.dentalSpend || 0) > (S.flags.deductUsed || 0));
      const avail = POOL.filter(c=>(!c.min || S.month >= c.min) && !done(c) && reqOk(c));
      const fresh = avail.filter(c=>!S.used.has(c.t));
      /* one-per-run cards (мамин ДР, свадьба, айфон...) never come back from the stale pile */
      const stale = avail.filter(c=>S.used.has(c.t) && !c.once);
      let picks = shuffle(fresh.slice()).slice(0, CARDS_PER_MONTH);
      if (picks.length < CARDS_PER_MONTH) picks = picks.concat(shuffle(stale.slice()).slice(0, CARDS_PER_MONTH - picks.length));
      if (!S.depositOpen && S.month >= 2){
        const depCard = POOL.find(c => c.L.fx === 'unlockDeposit');
        if (!picks.includes(depCard)) picks[Math.floor(Math.random()*picks.length)] = depCard;
      }
      /* level 2 on-ramp: the bank pitches bonds until you engage; a month later Vitalik pitches stocks */
      if (S.level >= 2 && !S.bondsOpen){
        const bCard = POOL.find(c => c.L.fx === 'unlockBonds');
        if (!picks.includes(bCard)) picks[Math.floor(Math.random()*picks.length)] = bCard;
      }
      if (S.bondsOpen && !S.stocksOpen && S.month >= 8){
        const sCard = POOL.find(c => c.L.fx === 'unlockStocks');
        if (!picks.includes(sCard)) picks[Math.floor(Math.random()*picks.length)] = sCard;
      }
      /* level 3 on-ramp: broker pitches the fund, then the exam */
      if (S.level >= 3 && !S.fundOpen){
        const fCard = POOL.find(c => c.L.fx === 'unlockFund');
        if (!picks.includes(fCard)) picks[Math.floor(Math.random()*picks.length)] = fCard;
      }
      if (S.level >= 3 && S.fundOpen && !S.examPassed){
        const eCard = POOL.find(c => c.L.fx === 'openExam');
        if (!picks.includes(eCard)) picks[Math.floor(Math.random()*picks.length)] = eCard;
      }
      picks.forEach(c=>S.used.add(c.t));
      // crises: no repeats until pool exhausted; prevention excludes linked crises
      const nCr = S.month <= 2 ? 2 : (2 + (Math.random() < .5 ? 1 : 0));
      const allowed = c => !(c.k === 'tooth' && S.flags.dental) && !(c.k === 'back' && S.flags.gym);
      let crPool = CRISES.filter(c => allowed(c) && !S.usedCr.has(CRISES.indexOf(c)));
      if (crPool.length < nCr){
        /* reset the rotation, but «умершая навсегда» техника (холодильник и т.п.) не ломается второй раз */
        S.usedCr = new Set([...S.usedCr].filter(idx => CRISES[idx] && CRISES[idx].once));
        crPool = CRISES.filter(c => allowed(c) && !S.usedCr.has(CRISES.indexOf(c)));
      }
      const crs = shuffle(crPool.slice()).slice(0, nCr).map(c=>({crisis:c}));
      crs.forEach(cr=>S.usedCr.add(CRISES.indexOf(cr.crisis)));
      const deck = picks.map(c=>({card:c}));
      crs.forEach(cr=>{ const pos = 2 + Math.floor(Math.random()*(deck.length-2)); deck.splice(pos,0,cr); });
      S.deck = deck; S.monthTotal = deck.length;
    }
    function crisisToCard(cr){
      const full = {lbl:cr.skill ? 'Смириться и заплатить' : 'Решить по-нормальному', m:-cr.cost};
      let alt;
      if (cr.alt && cr.alt.skill){ alt = {lbl:cr.alt.lbl, fx:'__skill', skillCost:cr.cost}; }
      else if (cr.alt){ alt = {lbl:cr.alt.lbl, m:-cr.alt.cost}; ['h','o','r'].forEach(k=>{ if(cr.alt[k]) alt[k]=cr.alt[k]; }); }
      else alt = {lbl:'Вздохнуть и заплатить', m:-cr.cost};
      return {e:cr.e, cat:'⚡ кризис', t:(typeof cr.t === 'function' ? cr.t() : cr.t), L:alt, R:full, isCrisis:true};
    }

    /* ===== CARD UI ===== */
    let topCard = null, drag = null, dragMoved = false;
    function effPreview(eff){
      const parts = [];
      const wrap = (up, inner) => '<span class="' + (up?'g':'b') + '">' + inner + '</span>';
      if (eff.m) parts.push(wrap(eff.m>0, (eff.m>0?'+':'−') + Math.abs(eff.m).toLocaleString('ru-RU') + ' ₽'));
      [['h'],['o'],['r']].forEach(([k])=>{ if (eff[k]) parts.push(wrap(eff[k]>0, ICO[k] + (eff[k]>0?'+':'−') + Math.abs(eff[k]))); });
      if (['friendLoan','shitcoin','hype','margin'].includes(eff.fx)) parts.push('🎲');
      if (eff.fx === 'mfoTrap') parts.push('<span class="b">⏳ а потом?</span>');
      if (eff.fx === 'panicSell') parts.push('<span class="b">фиксация −8%</span>');
      if (eff.fx === '__skill') parts.push('⚡ ловкость!');
      if (eff.fx === 'openExam') parts.push('📝 3 вопроса');
      return parts.join(' &nbsp;') || '✔ без последствий';
    }
    function stampLabel(s){ s=(s||'').replace(/[«»]/g,''); return s.length>24?s.slice(0,23)+'…':s; }
    function setGlow(dx){
      const gl=$('glowL'), gr=$('glowR'); if(!topCard) return;
      const t=Math.min(1,Math.abs(dx)/95);
      const st=Math.min(1,Math.abs(dx)/52);
      const sl=topCard.el.querySelector('.cStamp.left'), sr=topCard.el.querySelector('.cStamp.right');
      if (dx<0){ gl.style.opacity=t; gr.style.opacity=0; if(sl){sl.style.opacity=st; sl.style.transform='translate(-50%,0) rotate(-7deg) scale('+(0.88+0.14*st)+')';} if(sr) sr.style.opacity=0; }
      else if (dx>0){ gr.style.opacity=t; gl.style.opacity=0; if(sr){sr.style.opacity=st; sr.style.transform='translate(-50%,0) rotate(7deg) scale('+(0.88+0.14*st)+')';} if(sl) sl.style.opacity=0; }
      else { gl.style.opacity=0; gr.style.opacity=0; if(sl)sl.style.opacity=0; if(sr)sr.style.opacity=0; }
    }
    function clearGlow(){ const gl=$('glowL'),gr=$('glowR'); if(gl)gl.style.opacity=0; if(gr)gr.style.opacity=0; }
    function animateHUD(){ const h=$('hud'); if(!h) return; h.classList.remove('hud-anim'); void h.offsetWidth; h.classList.add('hud-anim'); }
    function showCard(){
      const tbl = $('table');
      tbl.querySelectorAll('.card').forEach(c=>c.remove());
      clearGlow();
      if (!S.deck.length){ endMonth(); return; }
      const item = S.deck[0];
      const src = item.crisis ? crisisToCard(item.crisis) : item.card;
      const data = Object.assign({}, src, { t: (typeof src.t === 'function' ? src.t() : src.t) });
      if (S.deck.length > 1){ const b = document.createElement('div'); b.className = 'card back'; tbl.appendChild(b); }
      const el = document.createElement('div'); el.className = 'card top' + (data.isCrisis?' crisis':'');
      el.innerHTML = `
        <div class="cStamp left">${stampLabel(data.L.lbl)}</div>
        <div class="cStamp right">${stampLabel(data.R.lbl)}</div>
        <span class="cCat">${data.cat || ''}</span>
        <div class="cArt"><span class="cEmoji">${data.e}</span></div>
        <div class="cText">${termify(data.t)}</div>
        <div class="choices">
          <div class="choice" data-side="L"><span class="dir">← влево</span><span class="lbl2">${data.L.lbl}</span><span class="fx eff">${effPreview(data.L)}</span></div>
          <div class="choice" data-side="R"><span class="dir">вправо →</span><span class="lbl2">${data.R.lbl}</span><span class="fx eff">${effPreview(data.R)}</span></div>
        </div>`;
      tbl.appendChild(el);
      topCard = {el, data};
      el.querySelectorAll('.choice').forEach(ch=>{
        ch.addEventListener('click', ()=>{ if (dragMoved) return; if (topCard && topCard.el === el) resolve(ch.dataset.side); });
      });
      attachDrag(el);
    }
    function attachDrag(el){
      const chL = el.querySelector('.choice[data-side="L"]');
      const chR = el.querySelector('.choice[data-side="R"]');
      el.addEventListener('pointerdown', e=>{
        if (!topCard || topCard.el !== el) return;
        drag = {x0:e.clientX, dx:0}; dragMoved = false; el.classList.add('drag'); el.style.transition = 'none'; el.style.animation = 'none';
        el.setPointerCapture(e.pointerId);
      });
      el.addEventListener('pointermove', e=>{
        if (!drag) return;
        drag.dx = e.clientX - drag.x0;
        if (Math.abs(drag.dx) > 8) dragMoved = true;
        el.style.transform = `translateX(${drag.dx}px) rotate(${drag.dx/20}deg)`;
        const hot = Math.abs(drag.dx) > 40;
        chL.classList.toggle('hot', hot && drag.dx < 0); chR.classList.toggle('hot', hot && drag.dx > 0);
        setGlow(drag.dx);
      });
      const up = ()=>{
        if (!drag) return;
        const dx = drag.dx; drag = null;
        if (Math.abs(dx) > 90) resolve(dx < 0 ? 'L' : 'R');
        else {
          el.style.transition = 'transform .28s cubic-bezier(.2,.7,.3,1)'; el.style.transform = '';
          el.classList.remove('drag'); chL.classList.remove('hot'); chR.classList.remove('hot'); clearGlow();
          const sl=el.querySelector('.cStamp.left'), sr=el.querySelector('.cStamp.right'); if(sl)sl.style.opacity=0; if(sr)sr.style.opacity=0;
        }
        setTimeout(()=>{ dragMoved = false; }, 50);
      };
      el.addEventListener('pointerup', up); el.addEventListener('pointercancel', up);
    }
    function keyHandler(e){
      if (!topCard || document.querySelector('.ovl.show')) return;
      if (e.key === 'ArrowLeft') resolve('L');
      if (e.key === 'ArrowRight') resolve('R');
    }
    function resolve(side){
      const {el, data} = topCard; topCard = null;
      if (navigator.vibrate) navigator.vibrate(12);
      el.classList.remove('drag');
      el.style.transition = 'transform .38s cubic-bezier(.4,.1,.4,1), opacity .38s';
      el.style.transform = `translateX(${side==='L'?-520:520}px) rotate(${side==='L'?-26:26}deg)`;
      el.style.opacity = 0;
      const g = side==='L' ? $('glowL') : $('glowR'), go = side==='L' ? $('glowR') : $('glowL');
      g.style.opacity = 1; go.style.opacity = 0;
      setTimeout(()=>{ g.style.transition='opacity .4s'; g.style.opacity=0; setTimeout(()=>{ g.style.transition='opacity .1s'; },420); }, 120);
      const eff = data[side];
      if (eff.fx === '__skill'){
        /* dexterity moment: crisis resolved via timing minigame */
        if (data.isCrisis) S.crisesTotal++;
        S.deck.shift(); saveGame();
        setTimeout(()=>openSkill(eff.skillCost || 7000), 380);
        return;
      }
      applyEff(eff, !!data.isCrisis);
      if (eff.m) S.monthLog.push([data.e + ' ' + eff.lbl, eff.m]);
      if (!eff.m && !eff.h && !eff.o && !eff.r) floatDelta('✔ ' + eff.lbl, 'neu');
      if (data.isCrisis) S.crisesTotal++;
      if (data.isCrisis && data.e === '🦷') S.flags.dentalSpend = (S.flags.dentalSpend || 0) + 1; // лечил зуб → положен вычет
      renderHUD(); S.deck.shift(); saveGame();
      setTimeout(showCard, 360);
    }

    /* ===== MONTH FLOW ===== */
    function ledgerHTML(rows){ return rows.map(([l,v])=>`<div><span>${l}</span><b class="${v>=0?'plus':'minus'}">${v>=0?'+':''}${fmt(v)}</b></div>`).join(''); }
    function payday(){
      S.mEarn = 0; S.mSpend = 0; S.gotBonus = false;
      /* snapshot of month start — the animated report shows deltas against it */
      S.snap = { cash:S.cash, cushion:S.cushion, deposit:S.deposit, bonds:S.bonds, stocks:S.stocks, fund:S.fund, debt:S.debt,
                 health:S.health, mood:S.mood, rel:S.rel, cap:totalCap(), crisesAbsorbed:S.crisesAbsorbed, goals:goalsDone() };
      const rows = [['Зарплата', S.salary]]; let total = S.salary;
      /* stats drive the paycheck */
      if (S.health < 25){ const sick = Math.round(S.salary * 0.15); rows.push(['🤒 Больничные: здоровье на дне', -sick]); total -= sick; }
      if (S.mood < 25){ const burn = Math.round(S.salary * 0.10); rows.push(['🔥 Выгорание: дедлайны сорваны, премию срезали', -burn]); total -= burn; }
      if (S.health >= 70 && S.mood >= 70){ rows.push(['⭐ Премия: бодрый и в ресурсе', 5000]); total += 5000; S.gotBonus = true; }
      if (S.rel < 25){ S.mood = Math.max(0, S.mood - 8); noteQueue.push('Ты всех продинамил — звать перестали. Одиночество бьёт по настроению (😞 −8). Отношения — тоже актив.'); }
      if (S.mfo > 0){ const owe = Math.round(S.mfo * 1.3); rows.push(['🧾 Микрозайм: «0%» закончились, набежало', -owe]); total -= owe; S.mfo = 0;
        noteQueue.push('Микрозайм: за взятые 10 000 отдал 13 000. «0% на 7 дней» — это крючок, а не подарок. Эффективная ставка — сотни процентов годовых.'); }
      FIX.forEach(([l,v])=>{ rows.push([l,v]); total += v; });
      if (S.creditLeft > 0){ rows.push([`Кредит за телефон (ещё ${S.creditLeft} мес)`, -S.credit]); total -= S.credit; S.creditLeft--; }
      if (S.catCost){ rows.push(['Кот (корм, наполнитель, вайб)', -S.catCost]); total -= S.catCost; }
      if (S.cashback){ rows.push(['Кэшбэк', 600]); total += 600; }
      if (S.debt > 0){ const pay = Math.min(S.debt, Math.max(0, S.cash + total)); rows.push(['Погашение микрозайма', -pay]); total -= pay; S.debt -= pay; }
      S.cash += total;
      $('payTitle').textContent = `Месяц ${S.month}. День зарплаты`;
      $('payLedger').innerHTML = ledgerHTML(rows);
      $('payNote').textContent = S.creditLeft === 0 && S.month <= 3 ? 'Кредит за телефон скоро закончится. Держись.' : 'Свободный остаток — твоё поле для манёвра. Или для глупостей.';
      renderHUD(); S.monthLog = rows.slice(); saveGame(); show('payOvl');
    }
    function closePayday(){ hide('payOvl'); buildDeck(); saveGame(); showCard(); setTimeout(maybeShowNote, 260); }
    /* ---- goals & cash flow ---- */
    const GOALS = { cushion:60000, capital:150000, quality:50 };
    function maxMonths(){ return S.level >= 3 ? 18 : (S.level >= 2 ? 12 : MONTHS); }
    function totalCap(){ return S.cash + S.cushion + S.deposit + S.bonds + S.stocks + S.fund - S.debt; }
    function goalsHTML(){
      const cap = totalCap();
      const q = Math.round((S.health + S.mood + S.rel) / 3);
      const row = (ico, label, cur, target, fmtFn) => {
        const done = cur >= target;
        return `<div class="goalRow"><span>${ico} ${label}</span><span class="${done?'gDone':'gTodo'}">${done?'✓ ':''}${fmtFn(cur)} / ${fmtFn(target)}</span></div>`;
      };
      return row('🛡','Подушка', S.cushion, GOALS.cushion, fmt)
           + row('💰','Капитал', cap, GOALS.capital, fmt)
           + row('🌞','Качество жизни', q, GOALS.quality, v=>v);
    }
    function goalsDone(){
      const cap = totalCap();
      const q = Math.round((S.health + S.mood + S.rel) / 3);
      return (S.cushion >= GOALS.cushion) + (cap >= GOALS.capital) + (q >= GOALS.quality);
    }
    function openFlow(){
      $('flowTitle').textContent = `Месяц ${S.month}: движение денег`;
      const log = S.monthLog || [];
      $('flowList').innerHTML = log.length
        ? log.map(([l,v])=>`<div class="row"><span>${l}</span><b class="${v>=0?'plus':'minus'}">${v>=0?'+':''}${fmt(v)}</b></div>`).join('')

    /* ===== GLOSSARY: подчёркнутые термины, объяснение по тапу, копятся в словаре ===== */
    const TERMS = {
      cushion:{ w:'Подушка', re:/подушк[а-яё]*/i, d:'Запас денег на случай, если доход пропадёт: болезнь, увольнение, кризис. Лежит там, откуда можно забрать мгновенно (накопительный счёт). Минимум — месяц расходов, в идеале 3–6. Это не инвестиция — это броня. В игре правило простое: обычные траты идут с карты, а удары кризисов ⚡ первой принимает подушка — и только остаток бьёт по карте.' },

      broker:{ w:'Брокер', re:/брокер[а-яё]*/i, d:'Посредник с лицензией, через которого покупают бумаги на бирже. Сам ничего не советует бесплатно: зарабатывает на комиссиях с твоих сделок — поэтому любит, когда ты торгуешь часто.' },

    function termify(text){
      let out = text;
      Object.entries(TERMS).forEach(([key, t])=>{
        if (out.includes('data-t="' + key + '"')) return;
        out = out.replace(t.re, m => `<span class="term" data-t="${key}">${m}</span>`);
      });
      return out;
    }
    function openTerm(key){
      const t = TERMS[key]; if (!t) return;
      const isNew = S && !S.glossary.has(key);
      if (S){ S.glossary.add(key); saveGame(); }
      $('termBody').innerHTML = `
        <div class="nIco">📖</div>
        <h2>${t.w}</h2>
        <p style="text-align:left">${t.d}</p>
        ${isNew ? '<p class="small">Слово добавлено в словарь (меню → 📖)</p>' : ''}
        <button class="btn" onclick="G.closeTerm()">Понятно</button>`;
      show('termOvl');
    }
    function closeTerm(){ hide('termOvl'); setTimeout(maybeShowNote, 240); }
    document.addEventListener('click', e => {
      const el = e.target.closest ? e.target.closest('.term') : null;
      if (el){ e.stopPropagation(); openTerm(el.dataset.t); }
    }, true);

    /* ===== LEVEL 3: broker exam (по мотивам реального теста ЦБ) ===== */
    const EXAM_QS = [
      { q:'Ты купил акции с плечом ×5. Акция упала на 20%. Что с твоими деньгами?',
        a:['Потерял 20% — как без плеча','Потерял всё: плечо умножает и убыток','Ничего, брокер компенсирует'], ok:1 },
      { q:'Гарантирует ли фонд (БПИФ) доходность?',
        a:['Да, это же готовое решение','Гарантирует государство','Нет — стоимость пая может и падать'], ok:2 },
      { q:'Чем ограничен убыток при покупке акций на свои (без плеча)?',
        a:['Ничем, можно уйти в минус','Вложенной суммой: ниже нуля акция не падает','Убытки страхует биржа'], ok:1 },
    ];
    let EX = null;
    function startExam(){ EX = { i:0, correct:0 }; renderExam(); show('examOvl'); }
    function renderExam(){
      const q = EXAM_QS[EX.i];
      $('examBody').innerHTML = `
        <p class="small" style="margin:4px 0">Вопрос ${EX.i+1} из ${EXAM_QS.length}</p>
        <p style="font-weight:700">${q.q}</p>
        ${q.a.map((t,idx)=>`<button class="qOpt" onclick="G.examAnswer(${idx})">${t}</button>`).join('')}`;
    }
    function examAnswer(idx){
      if (!EX) return;
      if (idx === EXAM_QS[EX.i].ok) EX.correct++;
      EX.i++;
      if (EX.i < EXAM_QS.length){ renderExam(); return; }
      const passed = EX.correct === EXAM_QS.length;
      hide('examOvl'); EX = null;
      if (passed){ S.examPassed = true; saveGame(); }
      /* результат — сразу после закрытия листа теста, а не «через несколько шагов» */
      setTimeout(()=>{
        toast(passed
          ? '✅ Тест сдан: 3 из 3. Открыт демо-терминал — ищи «🕹 Торговая сессия» в конце месяца, при распределении денег.'
          : '❌ Тест не сдан: меньше 3 из 3 верных. Как и у ЦБ — пересдача бесплатна, брокер предложит тест снова.');
      }, 250);
      renderHUD();
    }

    /* ===== LEVEL 3: trading session (пошагово, без таймера) ===== */
    let TR = null;
    function openTrade(){
      if (TR) return;
      const real = S.cash >= 10000;
      if (real){ S.cash -= 10000; renderHUD(); }
      const roll = Math.random();
      const kind = roll < 0.5 ? 'walk' : (roll < 0.75 ? 'up' : 'down');
      const data = [100];
      for (let i = 1; i < 46; i++){
        const drift = kind === 'walk' ? 0 : (kind === 'up' ? 0.005 : -0.005);
        data.push(Math.max(30, data[i-1] * (1 + drift + (Math.random()*2 - 1) * 0.022)));
      }
      TR = { data, idx:30, end:45, pos:0, shares:0, value:10000, real, kind, done:false };
      hide('allocOvl');
      renderTrade();
      show('tradeOvl');
    }
    function renderTrade(){
      const view = TR.data.slice(TR.idx - 29, TR.idx + 1);
      const min = Math.min(...view) * 0.98, max = Math.max(...view) * 1.02;
      const px = (v)=> (132 - (v - min) / (max - min) * 124).toFixed(1);
      const pts = view.map((v, i) => (i * (320/29)).toFixed(1) + ',' + px(v)).join(' ');
      /* инвест-курс пройден → видна скользящая средняя (линия тренда) */
      let smaLine = '';
      if (S.flags.invEdu){
        const smaPts = view.map((v, i) => {
          const gi = TR.idx - 29 + i;
          const win = TR.data.slice(Math.max(0, gi - 6), gi + 1);
          const avg = win.reduce((s,x)=>s+x,0) / win.length;
          return (i * (320/29)).toFixed(1) + ',' + px(avg);
        }).join(' ');
        smaLine = `<polyline points="${smaPts}" fill="none" stroke="var(--rel)" stroke-width="1.8" stroke-dasharray="5 4" opacity=".85"/>`;
      }
      const p = TR.data[TR.idx];
      const val = TR.pos ? TR.shares * p : TR.value;
      $('tradeBody').innerHTML = `
        <svg class="chartSvg" viewBox="0 0 320 140" preserveAspectRatio="none">
          ${smaLine}
          <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
          <circle cx="320" cy="${px(p)}" r="4" fill="var(--accent)"/>
        </svg>
        ${S.flags.invEdu ? '<p class="small" style="margin:0 0 4px">╌╌ скользящая средняя (курс биржи): цена выше линии — тренд скорее вверх</p>' : ''}
        <div class="dRow"><span>📅 День <b>${TR.idx - 29}</b> из 16</span><span class="dv">Цена: ${p.toFixed(1)}</span></div>
        <div class="dRow"><span>${TR.pos ? '📈 В бумаге' : '💰 В деньгах'}</span><span class="dv" style="color:${val>=10000?'var(--good)':'var(--bad)'}">${fmt(Math.round(val))}</span></div>
        <p class="small" style="margin:8px 0 2px">${TR.real ? 'Играешь на свои 10 000 ₽. ' : 'Демо: денег на ставку не было. '}Жми <b>«День ▸»</b> — время идёт только по кнопке. Купить/продать можно в любой день.</p>
        <div style="display:flex;gap:8px;margin-top:10px;align-items:stretch">
          ${TR.pos ? '<button class="btn sec" style="flex:1;margin:0" onclick="G.tradeAct(\'sell\')">Продать</button>' : '<button class="btn sec" style="flex:1;margin:0" onclick="G.tradeAct(\'buy\')">Купить</button>'}
          <button class="btn" style="flex:1.5;margin:0" onclick="G.tradeAct('next')">День ▸</button>
        </div>`;
    }
    function tradeAct(a){
      if (!TR || TR.done) return;
      const p = TR.data[TR.idx];
      if (a === 'buy' && !TR.pos){ TR.pos = 1; TR.shares = TR.value / p; }
      else if (a === 'sell' && TR.pos){ TR.pos = 0; TR.value = TR.shares * p; }
      else if (a === 'next'){
        TR.idx++;
        if (TR.idx >= TR.end){ endTrade(); return; }
      }
      renderTrade();
    }
    function endTrade(){
      TR.done = true; TR.doneAt = Date.now();
      const last = TR.data[TR.end];
      const finalV = Math.round(TR.pos ? TR.shares * last : TR.value);
      const bh = Math.round(10000 * last / TR.data[30]);
      const pnl = finalV - 10000;
      if (TR.real){ S.cash += finalV; S.monthLog.push(['🕹 Торговая сессия', pnl]); renderHUD(); saveGame(); }
      const kindTxt = TR.kind === 'walk'
        ? '🎲 Секрет: график был <b>чистой случайностью</b> — монетка, никакой логики. Любой результат на нём — удача, не мастерство. На коротких отрезках реальный рынок почти неотличим от такого.'
        : '📈 Секрет: в графике был устойчивый тренд ' + (TR.kind === 'up' ? 'вверх' : 'вниз') + ' — но за шумом его почти не видно, правда?';
      const cmp = bh >= finalV
        ? '«Просто купить и держать» дало бы <b>' + fmt(bh) + '</b> — пассивность обыграла твою активность. По статистике так и бывает чаще всего.'
        : 'Ты обыграл «купи и держи» (' + fmt(bh) + ') — на этот раз.';
      $('tradeBody').innerHTML = `
        <p style="font-weight:800;font-size:22px;margin:6px 0" class="${pnl>=0?'':''}" >Итог: <span style="color:${pnl>=0?'var(--good)':'var(--bad)'}">${pnl>=0?'+':''}${fmt(pnl)}</span></p>
        <p>${cmp}</p>
        <p class="small">${kindTxt}</p>
        <button class="btn" onclick="G.closeTrade()">${TR.real ? 'Забрать ' + fmt(finalV) : 'Понятно'}</button>`;
    }
    function closeTrade(){
      /* защита от проклика: последний тап «День ▸» не должен закрыть результат */
      if (TR && TR.doneAt && Date.now() - TR.doneAt < 600) return;
      TR = null;
      hide('tradeOvl');
      setTimeout(()=>{ updateAlloc(); show('allocOvl'); }, 230);
    }

    /* ===== dexterity micro-game: перекрой кран (телеграфировано, провал щадящий) ===== */
    let SK = null;
    function openSkill(cost){
      SK = { cost, t0: Date.now(), raf: null, timeout: null };
      $('skillBody').innerHTML = `
        <p style="font-weight:700">Вода прибывает! Жми «Перекрыть», когда бегунок в зелёной зоне.</p>
        <div class="skillBar"><div class="skillZone y"></div><div class="skillZone g"></div><div class="skillMk" id="skillMk"></div></div>
        <button class="btn" onclick="G.skillStop()">🔧 Перекрыть!</button>`;
      show('skillOvl');
      const mk = () => {
        if (!SK) return;
        const t = (Date.now() - SK.t0) / 1000;
        const pos = 0.5 + 0.5 * Math.sin(t * 4.6);
        const el = $('skillMk'); if (el) el.style.left = 'calc(' + (pos * 100).toFixed(1) + '% - 3px)';
        SK.raf = requestAnimationFrame(mk);
      };
      SK.raf = requestAnimationFrame(mk);
      SK.timeout = setTimeout(()=>{ if (SK) skillStop(true); }, 6000); // замешкался — вода своё возьмёт
    }
    function skillStop(late){
      if (!SK) return;
      cancelAnimationFrame(SK.raf); clearTimeout(SK.timeout);
      const t = (Date.now() - SK.t0) / 1000;
      const pos = late ? 1 : 0.5 + 0.5 * Math.sin(t * 4.6);
      const off = Math.abs(pos - 0.5);
      const cost = SK.cost; SK = null;
      let dmg, msg;
      if (late){ dmg = cost; msg = 'Замешкался — вода добралась до соседей снизу. Полный ущерб.'; }
      else if (off <= 0.13){ dmg = Math.round(cost * 0.15); msg = '🎯 Успел! Пара луж — отделался малым.'; }
      else if (off <= 0.30){ dmg = Math.round(cost * 0.5); msg = 'Почти успел — половина ущерба.'; }
      else { dmg = cost; msg = 'Не успел — полный ущерб. Бывает.'; }
      hide('skillOvl');
      applyMoney(-dmg, true);
      floatDelta(ICO.m + '<span>−' + Math.abs(dmg).toLocaleString('ru-RU') + ' ₽</span>', 'down');
      S.monthLog.push(['🚿 Прорвало кран', -dmg]);
      setTimeout(()=>toast(msg), 250); // после закрытия листа мини-игры — иначе застрянет в очереди
      renderHUD(); saveGame();
      setTimeout(showCard, 320);
    }
    function endMonth(){
      const rows = [['Заработано за месяц', S.mEarn], ['Потрачено', -S.mSpend]];
      S.pending = S.pending.filter(p=>{
        if (Math.random() < p.chance){
          S.cash += p.amount; if (p.amount) rows.push([p.label, p.amount]);
          if (p.salaryUp){ S.salary += p.salaryUp; noteQueue.push('✅ ' + p.label + ' Зарплата +' + p.salaryUp.toLocaleString('ru-RU') + ' ₽ навсегда.'); }
          else if (p.label) noteQueue.push('✅ ' + p.label + ': +' + (p.amount.toLocaleString('ru-RU') + ' ₽').replace(/\s/g,'\u00A0'));
        }
        else if (p.failLabel) noteQueue.push(p.failLabel);
        return false;
      });
      if (S.depositOpen && S.deposit > 0){ const int_ = Math.round(S.deposit * 0.01); S.deposit += int_; rows.push(['Проценты по депозиту', int_]); }
      /* подушка лежит на накопительном счёте: работает, но меньше депозита — цена мгновенного доступа */
      if (S.cushion > 0){ const ci = Math.round(S.cushion * 0.005); S.cushion += ci; rows.push(['🛡 Подушка на накопительном счёте (+0,5%)', ci]); }
      if (S.cushion >= 60000){ S.mood = Math.min(100, S.mood + 2); }
      /* level 2: markets move */
      if (S.level >= 2){
        if (S.bonds > 0){ const coupon = Math.round(S.bonds * 0.011); S.bonds += coupon; rows.push(['📜 Облигации: купон (~14% годовых)', coupon]); }
        let crashed = false;
        if (S.stocks > 0){
          if (Math.random() < 0.1){
            crashed = true;
            const drop = Math.round(S.stocks * 0.18); S.stocks -= drop; rows.push(['📉 ОБВАЛ РЫНКА: акции −18%', -drop]);
            noteQueue.push('Рынок обвалился на 18%. Это нормально — такое случается. Худшее, что можно сделать сейчас, — продать в панике. Лучшее — докупить, если есть подушка.');
          } else {
            const r = pick([-0.09, -0.04, 0.01, 0.03, 0.06, 0.11]);
            const d = Math.round(S.stocks * r); S.stocks += d;
            rows.push(['📈 Акции: рынок за месяц ' + (r>0?'+':'') + Math.round(r*100) + '%', d]);
          }
        }
        if (S.fund > 0){
          if (crashed){
            const fd = Math.round(S.fund * 0.08); S.fund -= fd;
            rows.push(['📦 Фонд: обвал задел и его, но мягче: −8%', -fd]);
          } else {
            const r = pick([-0.025, 0.004, 0.01, 0.02, 0.035]);
            const d = Math.round(S.fund * r); S.fund += d;
            rows.push(['📦 Фонд: рынок за месяц ' + (r>0?'+':'') + (Math.round(r*1000)/10) + '%', d]);
          }
        }
      }
      if (S.debt > 0){ const gr = Math.round(S.debt * 0.3); S.debt += gr; rows.push(['Проценты по микрозайму (30%/мес)', -gr]); }
      let verdict = '';
      if (S.cash < 0){
        S.loansTaken++; const loan = Math.ceil((-S.cash) * 1.3 / 100) * 100; S.debt += loan; S.cash = 0;
        rows.push(['Микрозайм (ставка 30%/мес)', -loan]);
        verdict = '😬 Деньги кончились раньше месяца. Микрозайм закрыл дыру — и начал расти.';
      } else if (S.crisesTotal > 0 && S.crisesAbsorbed > 0){ verdict = '🛡 Подушка отработала: кризис прошёл без дыры в бюджете. Так это и работает.'; }
      else if (S.cash > 20000){ verdict = '👍 Остался приличный запас. Вопрос — куда он пойдёт: работать или испаряться?'; }
      else { verdict = 'Дожил. Впритык, но дожил.'; }
      if (S.debt > 45000){ gameOver(); return; }
      rows.slice(2).forEach(r=>S.monthLog.push(r));
      S.capHist.push([S.month, totalCap()]);
      renderHUD();
      buildReport(rows, verdict);
      showNotesThen(()=>{
        show('repOvl');
        animateCount($('repCap'), (S.snap && S.snap.cap) || 0, totalCap(), 950);
      });
    }
    function animateCount(el, from, to, ms){
      if (!el) return;
      const t0 = (typeof performance !== 'undefined' ? performance.now() : Date.now());
      const now_ = () => (typeof performance !== 'undefined' ? performance.now() : Date.now());
      const step = () => {
        const p = Math.min(1, (now_() - t0) / ms);
        const eased = 1 - Math.pow(1 - p, 3);
        el.textContent = fmt(Math.round(from + (to - from) * eased));
        if (p < 1) requestAnimationFrame(step);
      };
      requestAnimationFrame(step);
    }
    function buildReport(rows, verdict){
      const snap = S.snap || {};
      let i = 0;
      const rev = html => `<div class="rev" style="animation-delay:${Math.min(0.10 * i++ + 0.1, 2.4).toFixed(2)}s">${html}</div>`;
      const cap = totalCap();
      const capD = cap - (snap.cap || 0);
      let out = '';
      /* 1. capital with a running counter */
      out += rev(`<div class="secT">Капитал</div><div class="capBig" id="repCap">${fmt(cap)}</div><div class="capDelta ${capD>=0?'up':'down'}">${capD>=0?'▲ +':'▼ −'}${fmt(Math.abs(capD))} за месяц</div>`);
      /* 2. money flow */
      out += rev(`<div class="secT">Движение денег</div>`);
      rows.forEach(([l,v])=>{ out += rev(`<div class="dRow"><span>${l}</span><span class="dv" style="color:${v>=0?'var(--good)':'var(--bad)'}">${v>=0?'+':''}${fmt(v)}</span></div>`); });
      /* 3. asset deltas — «сейчас» сверху, «за месяц» подписью снизу */
      const absorbed0 = S.crisesAbsorbed - (snap.crisesAbsorbed || 0);
      const aRows = [];
      const dd = (ico,label,cur,prev,invert,note)=>{
        const d = cur - (prev || 0);
        if (!cur && !d) return;
        const up = invert ? d < 0 : d > 0;
        const cls = d === 0 ? 'zero' : (up ? 'up' : 'down');
        aRows.push(`<div class="dRow"><span style="align-self:flex-start;padding-top:2px">${ico} ${label}</span>
          <span style="text-align:right">
            <span class="dv" style="display:block">${fmt(cur)}</span>
            <span class="dd ${cls}" style="display:block;font-size:12px">${d===0?'без изменений':(d>0?'▲ +':'▼ −')+fmt(Math.abs(d))+' за месяц'}</span>
          </span></div>`
          + (note ? `<div style="font-size:12px;color:var(--muted);text-align:left;padding:2px 0 6px;border-bottom:1px solid var(--border)">${note}</div>` : ''));
      };
      dd('💰','На карте',S.cash,snap.cash);
      dd('🛡','Подушка',S.cushion,snap.cushion,false,
        absorbed0 > 0 ? '↳ подушка первой приняла удары кризисов — обычные траты идут с карты' : null);
      dd('🏦','Депозит',S.deposit,snap.deposit);
      dd('📜','Облигации',S.bonds,snap.bonds);
      dd('📈','Акции',S.stocks,snap.stocks);
      dd('📦','Фонд',S.fund,snap.fund);
      dd('🩸','Долг',S.debt,snap.debt,true);
      if (aRows.length){ out += rev(`<div class="secT">Активы · сейчас / изменение</div>`); aRows.forEach(r=>{ out += rev(r); }); }
      /* 4. you */
      out += rev(`<div class="secT">Ты · сейчас / изменение</div>`);
      [['❤️','Здоровье','health'],['😊','Настроение','mood'],['👥','Отношения','rel']].forEach(([ico,label,k])=>{
        const d = Math.round(S[k] - (snap[k] != null ? snap[k] : S[k]));
        const cls = d === 0 ? 'zero' : (d > 0 ? 'up' : 'down');
        out += rev(`<div class="dRow"><span>${ico} ${label}</span>
          <span style="text-align:right">
            <span class="dv" style="display:block">${Math.round(S[k])}</span>
            <span class="dd ${cls}" style="display:block;font-size:12px">${d===0?'без изменений':(d>0?'▲ +':'▼ −')+Math.abs(d)+' за месяц'}</span>
          </span></div>`);
      });
      /* 5. critical spots & wins */
      const crit = [], good = [];
      if (S.debt > 0) crit.push('🩸 Долг ' + fmt(S.debt) + ' — растёт на 30% в месяц. Гаси первым делом.');
      if (S.cushion === 0) crit.push('🛡 Подушки нет — следующий кризис ударит прямо по карману.');
      else if (S.cushion < 20000) crit.push('🛡 Подушка тонкая (' + fmt(S.cushion) + ') — серьёзный кризис её пробьёт.');
      if (S.cash < 5000 && S.debt === 0) crit.push('💰 Деньги на исходе — до зарплаты дотянуть будет непросто.');
      if (S.health < 25) crit.push('❤️ Здоровье на дне — в день зарплаты будут больничные (−15%).');
      if (S.mood < 25) crit.push('😊 Выгорание — премию срежут (−10% зарплаты).');
      if (S.rel < 25) crit.push('👥 Друзья потеряны из виду — одиночество бьёт по настроению.');
      const absorbed = S.crisesAbsorbed - (snap.crisesAbsorbed || 0);
      if (absorbed > 0) good.push('🛡 Подушка приняла кризис — бюджет остался цел. Так это и работает.');
      const savedNow = (S.cushion + S.deposit + S.bonds + S.stocks) - ((snap.cushion||0) + (snap.deposit||0) + (snap.bonds||0) + (snap.stocks||0));
      if (savedNow > 0) good.push('📈 Отложено и инвестировано за месяц: +' + fmt(savedNow));
      if (S.gotBonus) good.push('⭐ Премия за бодрость и настрой: +5 000. Баланс окупается.');
      if (S.cushion >= 180000) good.push('🧘 Подушка покрывает 3+ месяца жизни — редкий уровень надёжности. Спокойствие: +2 😊 каждый месяц.');
      else if (S.cushion >= 60000) good.push('😴 Подушка покрывает месяц жизни — спишь спокойно (+2 😊 каждый месяц). Следующая планка — 3 месяца (180 000).');
      if (goalsDone() > (snap.goals || 0)) good.push('🎯 Достигнута новая цель игры!');
      if (cap > (S.bestCap || 0)){ if (S.bestCap) good.push('🏆 Новый рекорд капитала!'); S.bestCap = cap; }
      if (crit.length){ out += rev(`<div class="secT" style="color:var(--bad)">⚠ Критично</div>`); crit.forEach(b=>{ out += rev(`<div class="badge crit">${b}</div>`); }); }
      if (good.length){ out += rev(`<div class="secT" style="color:var(--good)">✓ Молодец</div>`); good.forEach(b=>{ out += rev(`<div class="badge good">${b}</div>`); }); }
      out += rev(`<p style="margin:12px 0 0">${verdict}</p>`);
      out += rev(`<div class="secT">🎯 Цели игры</div>` + goalsHTML());
      $('repTitle').textContent = `Итоги месяца ${S.month}`;
      $('repBody').innerHTML = out;

    /* частицы: из кнопки — в строку актива (или обратно в «свободно» при выводе) */
    function flyParticles(fromEl, toEl){
      const sheet = document.querySelector('#allocOvl .sheet');
      if (!sheet || !fromEl) return;
      const sr = sheet.getBoundingClientRect(), fr = fromEl.getBoundingClientRect();
      const fx = fr.left + fr.width/2 - sr.left, fy = fr.top + fr.height/2 - sr.top;
      let tx, ty;
      if (toEl){
        const tr = toEl.getBoundingClientRect();
        tx = tr.left + tr.width*0.82 - sr.left; ty = tr.top + tr.height/2 - sr.top;
      }
      for (let i = 0; i < 7; i++){
        const p = document.createElement('span'); p.className = 'particle';
        p.style.left = fx + 'px'; p.style.top = fy + 'px';
        sheet.appendChild(p);
        const dx = (Math.random()-0.5)*36, dy = (Math.random()-0.5)*18;
        const gx = toEl ? (tx - fx + dx) : (Math.random()-0.5)*140;
        const gy = toEl ? (ty - fy + dy) : (-70 - Math.random()*70);
        requestAnimationFrame(()=>requestAnimationFrame(()=>{
          p.style.transitionDelay = (i*38) + 'ms';
          p.style.transform = `translate(${gx.toFixed(0)}px, ${gy.toFixed(0)}px) scale(.45)`;
          p.style.opacity = '0';
        }));
        setTimeout(()=>p.remove(), 1000 + i*38);
      }
      if (toEl) setTimeout(()=>pulse(toEl, true), 520);
    }

    /* ===== END SCREENS ===== */
    function title(cap){

    }
    function donutSVG(parts){
      const total = parts.reduce((s,p)=>s+p.v, 0) || 1;
      const R = 52, C = 2 * Math.PI * R;
      let off = 0, segs = '';
      parts.forEach(p=>{
        const frac = p.v / total; if (frac <= 0) return;
        segs += `<circle r="${R}" cx="70" cy="70" fill="none" stroke="${p.c}" stroke-width="26" stroke-dasharray="${Math.max(0, frac*C - 1.5).toFixed(1)} ${C.toFixed(1)}" stroke-dashoffset="${(-off*C).toFixed(1)}" transform="rotate(-90 70 70)"/>`;
        off += frac;
      });
      return `<svg viewBox="0 0 140 140" style="width:150px;height:150px;margin:4px auto 8px;display:block">${segs}</svg>`;
    }
    function lineSVG(hist){
      if (!hist || hist.length < 2) return '<p class="small">Слишком короткая история для графика.</p>';
      const vals = hist.map(h=>h[1]);
      const min = Math.min(...vals, 0), max = Math.max(...vals) * 1.05 || 1;
      const W = 300, H = 110;
      const X = i => (i * (W / (hist.length - 1))).toFixed(1);
      const Y = v => (H - 4 - (v - min) / (max - min) * (H - 14)).toFixed(1);
      const pts = hist.map((h,i)=>X(i) + ',' + Y(h[1])).join(' ');
      const li = hist.length - 1;
      return `<svg viewBox="0 0 ${W} ${H+16}" class="chartSvg" style="height:130px">
        <polyline points="${pts}" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linejoin="round"/>
        <circle cx="${X(li)}" cy="${Y(hist[li][1])}" r="4" fill="var(--accent)"/>
        <text x="2" y="${H+12}" font-size="10" fill="var(--muted)">мес ${hist[0][0]}</text>
        <text x="${W-2}" y="${H+12}" font-size="10" text-anchor="end" fill="var(--muted)">мес ${hist[li][0]}</text>
      </svg>`;
    }
    let FIN = null;

      s.push(`<h2>${qIco} Как ты жил</h2>
        ${bar('❤️','Здоровье',S.health,'var(--health)')}${bar('😊','Настроение',S.mood,'var(--mood)')}${bar('👥','Отношения',S.rel,'var(--rel)')}
        <p style="margin-top:12px">${finVerdict()}</p>`);

        <div class="dRow"><span>🏆 Пик капитала</span><span class="dv">${fmt(peak)}</span></div>
        <div class="dRow"><span>📖 Слов в словаре</span><span class="dv">${S.glossary.size}</span></div>`);
      s.push(`<h2>🎯 Цели</h2><p><b>Достигнуто: ${goalsDone()} из 3</b></p>${goalsHTML()}
        <p class="small" style="margin-top:12px">Лестница званий: 💀 &lt;0 · 🐹 &lt;40К · 🪖 &lt;120К · 🏠 &lt;250К · 🥷 250К+</p>
